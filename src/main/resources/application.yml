spring:
  datasource:
    url: jdbc:mysql://localhost:3306/municipal_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp

server:
  port: 8080

app:
  jwt:
    secret: change-me-please-very-secret-key-32-bytes-min
    expirationMs: 604800000 # 7 days

logging:
  level:
    org.hibernate.SQL: warn
    org.springframework.security: info